<!DOCTYPE html>

<title>Tools - AuraStudyZone</title>
</head>
<body>

<h1>🧮 Tools</h1>

<h3>Age Calculator</h3>
<input type="number" id="year" placeholder="Enter birth year">
<button onclick="calc()">Calculate</button>
<p id="result"></p>

<script>
function calc(){
let y=document.getElementById("year").value;
let age=new Date().getFullYear()-y;
document.getElementById("result").innerText="Your Age: "+age;
}
</script>

</body>
